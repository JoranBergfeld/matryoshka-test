# Smoke/demo config for Imagenette (a free 10-class ImageNet subset).
# NOT the codified ImageNet-1K experiment — this exists to prove the pipeline
# trains end-to-end on a GPU quickly. Run with:
#   $env:IMAGENET_PATH = "data/imagenette2-320"
#   uv run python scripts/train.py --config configs/imagenette.yaml --model mrl --epochs 3
run:
  seed: 42
  output_root: runs
  log_level: INFO

data:
  imagenet_path_env: IMAGENET_PATH
  num_classes: 10            # Imagenette has 10 classes
  quick:
    enabled: false           # quick-subset is an ImageNet-1K concept; off here
    num_classes: 100
  image_size: 224
  resize_size: 256
  mean: [0.485, 0.456, 0.406]
  std:  [0.229, 0.224, 0.225]

dataloader:
  batch_size: 128
  effective_batch_size: 128
  num_workers: 0             # Windows: >0 workers can hit page-file commit limit (err 1455)
  pin_memory: true
  persistent_workers: true
  prefetch_factor: 2

model:
  arch: resnet50
  embedding_dim: 2048
  mrl_nesting_dims: [8, 16, 32, 64, 128, 256, 512, 1024, 2048]
  mrl_dim_weights: null
  mrl_weighting: uniform

optim:
  name: sgd
  lr: 0.1
  momentum: 0.9
  weight_decay: 1.0e-4
  nesterov: false
  label_smoothing: 0.1

schedule:
  epochs: 3
  warmup_epochs: 1
  type: cosine

amp:
  enabled: true
  compile: false             # Windows/Triton support is flaky; not needed for a smoke

eval:
  topk: [1, 5]
  pca:
    fit_every_epochs: 10
    fit_sample_size: 50000
  latency:
    warmup_batches: 100
    measure_samples: 1000

checkpoint:
  save_last: true
  save_best: true
  best_metric: val_top1
